<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610" role="img" aria-labelledby="title desc">
  <title id="title">Saksham's developer profile</title>
  <desc id="desc">Animated dark developer profile banner for GitHub user skx56.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#030712"/><stop offset=".52" stop-color="#091426"/><stop offset="1" stop-color="#07131c"/></linearGradient>
    <linearGradient id="accent" x1="0" x2="1"><stop stop-color="#7c3aed"><animate attributeName="stop-color" values="#7c3aed;#22d3ee;#10b981;#7c3aed" dur="7s" repeatCount="indefinite"/></stop><stop offset=".5" stop-color="#22d3ee"/><stop offset="1" stop-color="#10b981"/></linearGradient>
    <linearGradient id="shine" x1="0" x2="1"><stop stop-color="#fff" stop-opacity="0"/><stop offset=".48" stop-color="#fff" stop-opacity=".12"/><stop offset=".52" stop-color="#fff" stop-opacity=".12"/><stop offset="1" stop-color="#fff" stop-opacity="0"/><animateTransform attributeName="gradientTransform" type="translate" values="-1 0;1.5 0" dur="6s" repeatCount="indefinite"/></linearGradient>
    <radialGradient id="orb"><stop stop-color="#22d3ee" stop-opacity=".20"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/></radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="28"/></filter><filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="clip"><rect x="1" y="1" width="1178" height="608" rx="25"/></clipPath>
    <pattern id="noise" width="80" height="80" patternUnits="userSpaceOnUse"><circle cx="9" cy="12" r=".55" fill="#fff" opacity=".12"/><circle cx="57" cy="41" r=".45" fill="#fff" opacity=".1"/><circle cx="33" cy="67" r=".4" fill="#fff" opacity=".1"/></pattern>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="1180" height="610" fill="url(#bg)"/><circle cx="110" cy="100" r="210" fill="url(#orb)" filter="url(#blur)"/><circle cx="1050" cy="540" r="270" fill="#7c3aed" opacity=".12" filter="url(#blur)"/><rect width="1180" height="610" fill="url(#noise)" opacity=".42"/>
    <g opacity=".55" stroke="#94a3b8" stroke-opacity=".11"><path d="M0 105H1180M0 210H1180M0 315H1180M0 420H1180M0 525H1180"/><path d="M95 0V610M200 0V610M305 0V610M410 0V610M515 0V610M620 0V610M725 0V610M830 0V610M935 0V610M1040 0V610"/></g>
    <g transform="translate(51 56)" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" fill="url(#accent)" filter="url(#glow)">
      <animateTransform attributeName="transform" type="translate" values="51 56;51 48;51 56" dur="4s" repeatCount="indefinite"/>
      <text x="0" y="45" font-size="30">   _____ _  ___  __</text><text x="0" y="78" font-size="30">  / ___/| |/ / |/ /</text><text x="0" y="111" font-size="30">  \__ \ |   /|   / </text><text x="0" y="144" font-size="30"> ___/ / |   \|   &lt;  </text><text x="0" y="177" font-size="30">/____/  |_|\_\_|\_\ </text>
      <text x="16" y="237" font-size="13" fill="#94a3b8">BUILD · LEARN · SHIP</text>
    </g>
    <g transform="translate(492 58)">
      <rect width="638" height="494" rx="19" fill="#0f172a" fill-opacity=".85" stroke="#fff" stroke-opacity=".16"/>
      <rect x="1" y="1" width="636" height="492" rx="18" fill="url(#shine)" opacity=".7"/>
      <circle cx="29" cy="29" r="6" fill="#fb7185"/><circle cx="50" cy="29" r="6" fill="#fbbf24"/><circle cx="71" cy="29" r="6" fill="#34d399"/><text x="100" y="34" fill="#94a3b8" font-family="ui-monospace,monospace" font-size="13">skx56@github: ~/profile</text><path d="M0 58H638" stroke="#fff" stroke-opacity=".1"/>
      <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18"><text x="32" y="107" fill="#10b981">$</text><text x="53" y="107" fill="#e2e8f0">whoami</text><text x="32" y="146" fill="#94a3b8">Saksham</text><text x="32" y="190" fill="#10b981">$</text><text x="53" y="190" fill="#e2e8f0">cat focus.txt</text><text x="32" y="229" fill="#94a3b8">Building, learning, and sharing in public.</text><text x="32" y="273" fill="#10b981">$</text><text x="53" y="273" fill="#e2e8f0">ls skills/</text></g>
      <g font-family="ui-monospace,monospace" font-size="13" fill="#dbeafe"><g transform="translate(32 302)"><rect width="92" height="30" rx="15" fill="#7c3aed" fill-opacity=".22" stroke="#a78bfa" stroke-opacity=".65"/><text x="18" y="20">Python</text></g><g transform="translate(135 302)"><rect width="108" height="30" rx="15" fill="#0891b2" fill-opacity=".22" stroke="#67e8f9" stroke-opacity=".65"/><text x="18" y="20">JavaScript</text></g><g transform="translate(254 302)"><rect width="81" height="30" rx="15" fill="#059669" fill-opacity=".22" stroke="#6ee7b7" stroke-opacity=".65"/><text x="18" y="20">Git</text></g><g transform="translate(346 302)"><rect width="93" height="30" rx="15" fill="#7c3aed" fill-opacity=".22" stroke="#c4b5fd" stroke-opacity=".65"/><text x="18" y="20">Linux</text></g></g>
      <g font-family="ui-monospace,monospace" font-size="16"><text x="32" y="388" fill="#10b981">$</text><text x="53" y="388" fill="#e2e8f0">echo "Let's connect"</text><text x="32" y="429" fill="url(#accent)">github.com/skx56</text><rect x="205" y="414" width="9" height="19" fill="#e2e8f0"><animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/></rect></g>
      <path d="M1 350H637" stroke="#fff" stroke-opacity=".1"/>
    </g>
    <rect x="1" y="1" width="1178" height="608" rx="25" fill="none" stroke="url(#accent)" stroke-opacity=".75"/><rect x="1" y="1" width="1178" height="608" rx="25" fill="none" stroke="#fff" stroke-opacity=".17"><animate attributeName="stroke-opacity" values=".08;.38;.08" dur="3s" repeatCount="indefinite"/></rect>
    <rect y="0" width="1180" height="3" fill="url(#accent)"><animate attributeName="y" values="0;607;0" dur="7s" repeatCount="indefinite"/></rect>
  </g>
</svg>
